worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;
    client_max_body_size 1024m;
    server_tokens off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ===== internos =====
    upstream api_upstream      { server 127.0.0.1:8080; }
    upstream ws_upstream       { server 127.0.0.1:9090; }
    upstream mediamtx_upstream { server 127.0.0.1:8889; }
    upstream minio_upstream    { server 127.0.0.1:9000; }

    # ===== DEV: Vite + todos os serviços (com SSL local) =====
    server {
        listen 4430 ssl;
        server_name 192.168.100.6;

        ssl_certificate     ../../cert/cert.pem;
        ssl_certificate_key ../../cert/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # API (rotas já têm /api/ no servidor)
        location /api/ {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://ws_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        # MinIO S3
        location /storage/ {
            proxy_pass http://minio_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_buffering off;
        }

        # MediaMTX WebRTC
        location /webrtc/ {
            proxy_pass http://mediamtx_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        # Vite dev server (SPA + HMR)
        location / {
            proxy_pass http://127.0.0.1:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }
    }

    # ===== PROD: tudo na porta 80, sem SSL (nginx externo termina TLS) =====
    server {
        listen 80;
        server_name _;

        root   ../web;
        index  index.html;

        # API (rotas já têm /api/ no servidor)
        location /api/ {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://ws_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        # MinIO S3
        location /storage/ {
            proxy_pass http://minio_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_buffering off;
        }

        # MediaMTX WebRTC
        location /webrtc/ {
            proxy_pass http://mediamtx_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        # Frontend SPA
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
