worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;
    client_max_body_size 1024m;
    server_tokens off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ===== internos (ajuste se necessario) =====
    upstream api_upstream     { server 127.0.0.1:18080; }  # sua API interna
    upstream ws_upstream      { server 127.0.0.1:19090; }  # seu WS interno
    upstream mediamtx_upstream{ server 127.0.0.1:18889; }  # MediaMTX interno
    upstream minio_upstream   { server 127.0.0.1:19000; }  # MinIO interno
    upstream minio_console    { server 127.0.0.1:19001; }  # MinIO console (opcional)
    upstream vite_upstream    { server 127.0.0.1:5173; }   # Vite dev server

    # DEV: Vite + API via /api/
    server {
        listen 4430 ssl;
        server_name 192.168.100.6;

        ssl_certificate     ../../cert/cert.pem;
        ssl_certificate_key ../../cert/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # API — strip /api/ prefix e encaminha ao backend
        location /api/ {
            proxy_pass http://api_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Tudo o resto vai para o Vite (assets, HMR, SPA)
        location / {
            proxy_pass http://vite_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }
    }

    # HTTP -> HTTPS
    server {
        listen 80;
        server_name 192.168.100.6;
        return 301 https://$host$request_uri;
    }

    # PROD: Site + API via /api/
    server {
        listen 443 ssl;
        server_name 192.168.100.6;

        ssl_certificate     ../../cert/cert.pem;
        ssl_certificate_key ../../cert/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        root   ../web;
        index  index.html;

        # API — strip /api/ prefix e encaminha ao backend
        location /api/ {
            proxy_pass http://api_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Frontend SPA
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # WebSocket externo: wss://host:8443
    server {
        listen 8443 ssl;
        server_name 192.168.100.6;

        ssl_certificate     ../../cert/cert.pem;
        ssl_certificate_key ../../cert/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://ws_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }
    }

    # MediaMTX externo: https://host:8889
    server {
        listen 8889 ssl;
        server_name 192.168.100.6;

        ssl_certificate     ../../cert/cert.pem;
        ssl_certificate_key ../../cert/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://mediamtx_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }
    }

    # MinIO S3 externo: https://host:9000
    server {
        listen 9000 ssl;
        server_name 192.168.100.6;

        ssl_certificate     ../../cert/cert.pem;
        ssl_certificate_key ../../cert/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://minio_upstream;
            proxy_http_version 1.1;

            # importante para assinatura AWS v4
            proxy_set_header Host $http_host;

            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_buffering off;
        }
    }

    # MinIO Console (opcional): https://host:9001
    server {
        listen 9001 ssl;
        server_name 192.168.100.6;

        ssl_certificate     ../../cert/cert.pem;
        ssl_certificate_key ../../cert/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://minio_console;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
